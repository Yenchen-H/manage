<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 羽球積分板（管理端）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1rem}
.app{max-width:760px;margin:0 auto}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.app-title{font-size:20px;font-weight:500}
.sync-status{font-size:12px;padding:3px 10px;border-radius:8px;border:1px solid #e0dfd8;background:#f9f9f7;color:#888}
.sync-status.ok{background:#E1F5EE;border-color:#9FE1CB;color:#0F6E56}
.sync-status.err{background:#FCEBEB;border-color:#F7C1C1;color:#A32D2D}
.sync-status.loading{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5}
.tab-nav{display:flex;border-bottom:1px solid #e0dfd8;margin-bottom:1.25rem;overflow-x:auto}
.tab-nav button{flex-shrink:0;font-size:13px;padding:8px 14px;border:none;background:transparent;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap}
.tab-nav button.on{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.btn{font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid #ccc;background:transparent;color:#1a1a18;cursor:pointer;font-family:inherit}
.btn:hover{background:#f1efe8}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.success{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.success:hover{background:#0F6E56}
.btn.sm{padding:3px 9px;font-size:12px}
.btn.danger{color:#A32D2D;border-color:#F7C1C1}
.btn.danger:hover{background:#FCEBEB}
input[type=text],input[type=number],input[type=date],input[type=password]{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a18;font-family:inherit}
input:focus{outline:2px solid #185FA5;border-color:#185FA5}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.lbl{font-size:12px;color:#888;margin-bottom:6px}

/* 出席名單 */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px}
.p-chip{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;border:1px solid #e0dfd8;cursor:pointer;user-select:none;font-size:13px;transition:all 0.15s}
.p-chip.on{background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-weight:500}
.p-chip .dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.p-chip.on .dot{background:#185FA5}

/* 比賽卡片 */
.match-list{display:flex;flex-direction:column;gap:10px}
.match-card{background:#f9f9f7;border:1px solid #e0dfd8;border-radius:12px;padding:12px 14px}
.match-card.scored{border-color:#9FE1CB;background:#f0fbf6}
.match-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.match-label{font-size:12px;color:#aaa;font-weight:500}
.match-body{display:flex;align-items:center;gap:8px}
.m-side{flex:1;min-width:0}
.m-players{font-size:13px;font-weight:500;color:#1a1a18;line-height:1.5}
.m-players.winner{color:#0F6E56}
.m-players.loser{color:#aaa}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.score-wrap{display:flex;align-items:center;gap:4px}
.score-wrap input{width:46px;text-align:center;padding:5px 6px;font-size:15px;font-weight:500;border-radius:8px;border:1px solid #ccc}
.score-sep{font-size:14px;color:#aaa}
.vs-txt{font-size:11px;color:#aaa}
.match-result{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:5px;display:inline-block}
.match-result.win{background:#E1F5EE;color:#0F6E56}
.match-result.draw{background:#f1efe8;color:#888}
.waiting-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 10px;background:#f1efe8;border-radius:8px;margin-top:8px;font-size:12px;color:#888}
.waiting-chip{font-size:12px;padding:2px 8px;border-radius:12px;background:#fff;border:1px solid #e0dfd8;color:#444}

/* 排行榜 */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e0dfd8;border-radius:12px}
.rank-pos{width:26px;font-size:13px;font-weight:500;color:#888;text-align:center;flex-shrink:0}
.rank-pos.gold{color:#BA7517}
.rank-pos.silver{color:#5F5E5A}
.rank-pos.bronze{color:#993C1D}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.rank-name{flex:1;font-size:14px}
.rank-score{font-size:15px;font-weight:500;min-width:36px;text-align:right}
.bar-track{flex:1;height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;min-width:40px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.metric{background:#f1efe8;border-radius:8px;padding:9px 12px}
.metric .ml{font-size:11px;color:#888;margin-bottom:3px}
.metric .mv{font-size:18px;font-weight:500}

/* 場次列表 */
.session-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.session-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid #e0dfd8;cursor:pointer;transition:all 0.15s;background:#fff}
.session-item:hover{background:#f9f9f7}
.session-item.on{border-color:#185FA5;background:#E6F1FB}
.session-date{font-size:12px;color:#888;flex-shrink:0;min-width:70px}
.session-name{flex:1;font-size:14px;font-weight:500}
.session-meta{font-size:12px;color:#aaa;flex-shrink:0}
.session-del{font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid #F7C1C1;background:transparent;color:#A32D2D;cursor:pointer;flex-shrink:0;font-family:inherit;opacity:0;transition:opacity 0.15s}
.session-item:hover .session-del{opacity:1}

/* 上場計數 */
.play-count-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:10px}
.play-count-chip{text-align:center;padding:6px 8px;border-radius:8px;border:1px solid #e0dfd8;font-size:12px;background:#fff}
.play-count-chip .pc-name{color:#1a1a18;font-weight:500}
.play-count-chip .pc-count{color:#888;font-size:11px}

.pts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.pts-card{background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:13px}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.savemsg{font-size:12px;color:#0F6E56;margin-left:6px;opacity:0;transition:opacity 0.3s}
.savemsg.show{opacity:1}
.h-table{width:100%;border-collapse:collapse;font-size:13px}
.h-table th{font-size:12px;color:#888;padding:5px 8px;border-bottom:1px solid #e0dfd8;text-align:left;font-weight:500}
.h-table td{padding:8px;border-bottom:1px solid #e0dfd8}
.h-table tr:last-child td{border-bottom:none}
.h-table td.r{text-align:right}
.divider{border:none;border-top:1px solid #e0dfd8;margin:1rem 0}
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.lock-screen .lock-icon{font-size:48px}
.lock-screen p{font-size:14px;color:#888}
.lock-screen input{font-size:16px;padding:10px 14px;border-radius:10px;border:1px solid #ccc;width:220px;text-align:center}
.lock-screen .err{font-size:13px;color:#A32D2D;height:18px}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#E6F1FB;border-radius:10px;margin-bottom:1rem;font-size:13px;color:#185FA5;flex-wrap:wrap}
@media(max-width:480px){.metrics{grid-template-columns:1fr 1fr}.metric:last-child{display:none}}
</style>
</head>
<body>
<div class="app">

<div id="lockScreen" class="lock-screen">
  <div class="lock-icon">🔒</div>
  <p id="lockHint">請輸入管理密碼</p>
  <input type="password" id="pwInput" placeholder="密碼" onkeydown="if(event.key==='Enter')unlock()">
  <button class="btn primary" onclick="unlock()">進入</button>
  <div class="err" id="pwErr"></div>
</div>

<div id="mainApp" style="display:none">
  <div class="topbar">
    <span class="app-title">🏸 羽球積分板</span>
    <span class="sync-status" id="syncStatus">未同步</span>
  </div>

  <div id="syncBar" style="display:none" class="sync-bar">
    ☁️ 有未儲存的變更
    <button class="btn sm primary" onclick="pushToCloud()">立即同步</button>
    <span class="savemsg" id="syncMsg"></span>
  </div>

  <div class="tab-nav">
    <button class="on" onclick="showTab('rank')">排行榜</button>
    <button onclick="showTab('session')">賽程管理</button>
    <button onclick="showTab('history')">歷史紀錄</button>
    <button onclick="showTab('settings')">設定</button>
  </div>

  <div id="tab-rank">
    <div class="metrics" id="metricCards"></div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <div id="tab-session" style="display:none">
    <div class="card">
      <p class="lbl" style="margin-bottom:10px">選擇或新增活動場次</p>
      <div class="row">
        <input type="date" id="newDate" style="width:140px">
        <input type="text" id="newSessionName" placeholder="活動名稱" style="flex:1;min-width:130px">
        <button class="btn primary" onclick="createSession()">＋ 新增</button>
      </div>
      <div class="session-list" id="sessionList"></div>
    </div>
    <div id="sessionContent"></div>
  </div>

  <div id="tab-history" style="display:none">
    <div id="histContent"></div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="card">
      <p class="lbl" style="margin-bottom:10px">選手名單</p>
      <div class="row"><input type="text" id="newName" placeholder="輸入選手姓名" style="width:150px"><button class="btn primary" onclick="addPlayer()">＋ 新增</button></div>
      <div id="playerListEl"></div>
    </div>
    <div class="card">
      <p class="lbl" style="margin-bottom:4px">計分規則</p>
      <p style="font-size:12px;color:#aaa;margin-bottom:0">每贏一場 → 上場的每人各得 <strong id="ptsPerWin">2</strong> 分　等待的人不計分</p>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <span style="font-size:13px">每勝得分：</span>
        <input type="number" id="winPtsInput" min="1" max="10" value="2" style="width:60px" onchange="updateWinPts()">
        <span style="font-size:13px">分</span>
      </div>
    </div>
    <div class="card">
      <p class="lbl" style="margin-bottom:4px">雲端設定</p>
      <p style="font-size:12px;color:#aaa;margin-bottom:10px">Apps Script Web App URL</p>
      <input type="text" id="cfgWebAppUrl" placeholder="貼上 Web App URL" style="width:100%;margin-bottom:8px">
      <button class="btn primary" onclick="saveCfgAndSync()">儲存並同步</button>
    </div>
    <div class="card">
      <p class="lbl" style="margin-bottom:10px">備份與還原</p>
      <div class="row" style="margin-bottom:0">
        <button class="btn success" onclick="exportJSON()">📤 匯出備份</button>
        <button class="btn" onclick="triggerImport()">📂 匯入還原</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
    <div class="card">
      <p class="lbl" style="margin-bottom:10px">危險操作</p>
      <button class="btn danger" onclick="if(confirm('確定清除全部資料？'))clearAll()">清除全部資料</button>
      <button class="btn danger" style="margin-left:8px" onclick="resetPassword()">重設密碼</button>
    </div>
  </div>
</div>
</div>

<script>
/* ========================
   預設設定
   ======================== */
const DEFAULT_PLAYERS = ['Yinglee','YC黃','伍彬彬','劉部長','小羅','小寶','雅瑄','宜芳','JOJO','詠婕','語喬'];
const AV_BG=['#B5D4F4','#C0DD97','#FAC775','#F4C0D1','#9FE1CB','#CECBF6','#F5C4B3','#F7C1C1','#D3D1C7','#EF9F27','#85B7EB'];
const AV_FG=['#0C447C','#27500A','#633806','#72243E','#085041','#3C3489','#712B13','#791F1F','#444441','#412402','#042C53'];

/* ========================
   資料結構
   sessions: [{id, date, name, attendees, matches:[
     {id, teamA:[p1,p2], teamB:[p3,p4], waiting:[p5,p6,...], scoreA, scoreB}
   ]}]
   ======================== */
let players=[], sessions=[], winPts=2, activeSessionId=null;
/* ★ 把你的 Web App URL 貼在這裡 ★ */
const FIXED_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbypIfkSrcSnzZReBu3_65YefnUSYZVumE3xD-0vwiy76KjGjdPyz32R8NFfKheBJh7w/exec';
let WEB_APP_URL=FIXED_WEB_APP_URL;

function avBg(i){return AV_BG[i%AV_BG.length];}
function avFg(i){return AV_FG[i%AV_FG.length];}
function pidx(n){return players.indexOf(n);}
function initials(n){return n.trim().slice(0,2).toUpperCase();}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p[0]+'/'+(+p[1])+'/'+(+p[2]);}

/* ========================
   密碼
   ======================== */
function unlock(){
  const pw=document.getElementById('pwInput').value;
  if(!pw)return;
  const saved=localStorage.getItem('bm_adminPw');
  if(saved&&pw!==saved){
    const e=document.getElementById('pwErr');
    e.textContent='密碼錯誤';setTimeout(()=>e.textContent='',2500);return;
  }
  if(!saved)localStorage.setItem('bm_adminPw',pw);
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainApp').style.display='';
  load();pullFromCloud();
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
if(!localStorage.getItem('bm_adminPw')){
  document.getElementById('lockHint').textContent='第一次使用：輸入你想設定的管理密碼';
}
function resetPassword(){
  if(!confirm('確定要重設密碼？'))return;
  localStorage.removeItem('bm_adminPw');
  alert('密碼已清除，重新整理後可設定新密碼。');
  location.reload();
}

/* ========================
   讀寫
   ======================== */
function load(){
  try{
    players=JSON.parse(localStorage.getItem('bm7_players')||'null')||DEFAULT_PLAYERS.slice();
    sessions=JSON.parse(localStorage.getItem('bm7_sessions')||'[]');
    winPts=parseInt(localStorage.getItem('bm7_winPts')||'2')||2;
    WEB_APP_URL=FIXED_WEB_APP_URL||localStorage.getItem('bm_webAppUrl')||'';
  }catch(e){players=DEFAULT_PLAYERS.slice();sessions=[];winPts=2;}
  const d=document.getElementById('newDate');
  if(d){const t=new Date();d.value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;}
  const wi=document.getElementById('winPtsInput');if(wi)wi.value=winPts;
  const wp=document.getElementById('ptsPerWin');if(wp)wp.textContent=winPts;
}
function localSave(){
  localStorage.setItem('bm7_players',JSON.stringify(players));
  localStorage.setItem('bm7_sessions',JSON.stringify(sessions));
  localStorage.setItem('bm7_winPts',String(winPts));
  document.getElementById('syncBar').style.display='';
  setSyncStatus('unsaved');
}
function getSession(id){return sessions.find(s=>s.id===id);}
function updateWinPts(){
  winPts=parseInt(document.getElementById('winPtsInput').value)||2;
  document.getElementById('ptsPerWin').textContent=winPts;
  localSave();renderRank();
}

/* ========================
   抽籤邏輯
   每次從出席名單抽4人，盡量讓上場少的人優先上，且避免同場次已同隊過的人再同隊
   ======================== */
function drawMatch(attendees, existingMatches){
  const n=attendees.length;
  if(n<4)return null;

  // 統計每人在本場次的上場次數
  const playCount={};
  attendees.forEach(p=>playCount[p]=0);
  (existingMatches||[]).forEach(m=>{
    [...m.teamA,...m.teamB].forEach(p=>{if(playCount[p]!==undefined)playCount[p]++;});
  });

  // 統計同隊次數（本場次內）
  const pairCount={};
  (existingMatches||[]).forEach(m=>{
    const pairs=[[m.teamA[0],m.teamA[1]],[m.teamB[0],m.teamB[1]]];
    pairs.forEach(([a,b])=>{
      if(!a||!b)return;
      const key=[a,b].sort().join('|');
      pairCount[key]=(pairCount[key]||0)+1;
    });
  });

  // 優先選上場次數少的4人
  const sorted=[...attendees].sort((a,b)=>playCount[a]-playCount[b]);
  // 取上場最少的4人（如果前4人上場數相同就取全部，否則盡量取最少的）
  const minCount=playCount[sorted[0]];
  const pool=sorted.filter(p=>playCount[p]<=minCount+1).slice(0,Math.max(4,sorted.filter(p=>playCount[p]===minCount).length));
  const candidates=pool.length>=4?pool:sorted.slice(0,4);

  // 從 candidates 選4人，再隨機分成2隊，盡量讓同隊次數少的人搭檔
  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  const picked=shuffle(candidates).slice(0,4);
  // 嘗試所有配對組合，找同隊次數最少的
  const combos=[
    [[picked[0],picked[1]],[picked[2],picked[3]]],
    [[picked[0],picked[2]],[picked[1],picked[3]]],
    [[picked[0],picked[3]],[picked[1],picked[2]]],
  ];
  const getPairScore=(a,b)=>pairCount[[a,b].sort().join('|')]||0;
  const getComboScore=([tA,tB])=>getPairScore(tA[0],tA[1])+getPairScore(tB[0],tB[1]);
  combos.sort((a,b)=>getComboScore(a)-getComboScore(b));
  const [teamA,teamB]=combos[0];
  const waiting=attendees.filter(p=>!picked.includes(p));

  return{id:genId(),teamA,teamB,waiting,scoreA:'',scoreB:''};
}

/* ========================
   統計：個人本場次累計積分
   ======================== */
function calcSessionScore(s){
  const score={};
  (s.attendees||[]).forEach(p=>score[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
    if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)m.teamA.forEach(p=>{if(score[p]!==undefined)score[p]+=winPts;});
    else if(sb>sa)m.teamB.forEach(p=>{if(score[p]!==undefined)score[p]+=winPts;});
  });
  return score;
}

function calcSessionWins(s){
  const wins={};
  (s.attendees||[]).forEach(p=>wins[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
    if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)m.teamA.forEach(p=>{if(wins[p]!==undefined)wins[p]++;});
    else if(sb>sa)m.teamB.forEach(p=>{if(wins[p]!==undefined)wins[p]++;});
  });
  return wins;
}

function getTotals(){
  return players.map((p,pi)=>{
    let total=0,sessCount=0,totalWins=0,totalMatches=0;
    sessions.forEach(s=>{
      if(!(s.attendees||[]).includes(p))return;
      const sc=calcSessionScore(s);
      const w=calcSessionWins(s);
      if(sc[p]!==undefined){total+=sc[p];sessCount++;totalWins+=w[p]||0;}
      // 計算上場場數
      (s.matches||[]).forEach(m=>{
        if([...m.teamA,...m.teamB].includes(p)){
          const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
          if(!isNaN(sa)&&!isNaN(sb))totalMatches++;
        }
      });
    });
    return{name:p,total,sessCount,wins:totalWins,matches:totalMatches,idx:pi};
  }).sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
}

/* ========================
   排行榜
   ======================== */
function renderRank(){
  const totals=getTotals();
  const maxScore=Math.max(...totals.map(t=>t.total),1);
  document.getElementById('metricCards').innerHTML=`
    <div class="metric"><div class="ml">目前領先</div><div class="mv">${totals[0]&&totals[0].total>0?totals[0].name:'—'}</div></div>
    <div class="metric"><div class="ml">活動場次</div><div class="mv">${sessions.length}</div></div>
    <div class="metric"><div class="ml">參賽人數</div><div class="mv">${players.length}</div></div>`;
  const medals=['🥇','🥈','🥉'];
  const rl=document.getElementById('rankList');rl.innerHTML='';
  if(!players.length){rl.innerHTML='<div class="empty">請到「設定」新增選手</div>';return;}
  totals.forEach((p,i)=>{
    const pct=maxScore>0?Math.round(p.total/maxScore*100):0;
    const div=document.createElement('div');div.className='rank-row';div.style.cssText='opacity:0;transform:translateY(10px)';
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    div.innerHTML=`<div class="rank-pos ${pc}">${medals[i]||('#'+(i+1))}</div>
      <div class="avatar" style="background:${avBg(p.idx)};color:${avFg(p.idx)}">${initials(p.name)}</div>
      <div class="rank-name">${p.name}<span style="font-size:11px;color:#aaa;margin-left:6px">${p.sessCount}場次・${p.wins}勝</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:0%;background:${avFg(p.idx)}"></div></div>
      <div class="rank-score">${p.total}</div>`;
    rl.appendChild(div);
    setTimeout(()=>{div.style.cssText='transition:transform 0.4s cubic-bezier(.22,.68,0,1.2),opacity 0.35s;opacity:1;transform:translateY(0)';},i*55);
    setTimeout(()=>{div.querySelector('.bar-fill').style.width=pct+'%';},i*55+180);
  });
}

/* ========================
   頁籤
   ======================== */
function showTab(t){
  ['rank','session','history','settings'].forEach(id=>{document.getElementById('tab-'+id).style.display=id===t?'':'none';});
  document.querySelectorAll('.tab-nav button').forEach((b,i)=>{b.classList.toggle('on',['rank','session','history','settings'][i]===t);});
  if(t==='rank')renderRank();
  if(t==='session')renderSessionTab();
  if(t==='history')renderHistoryTab();
  if(t==='settings')renderSettings();
}

/* ========================
   賽程管理
   ======================== */
function renderSessionTab(){
  renderSessionList();
  if(activeSessionId)renderSessionContent(activeSessionId);
  else document.getElementById('sessionContent').innerHTML='';
}

function renderSessionList(){
  const el=document.getElementById('sessionList');
  if(!sessions.length){el.innerHTML='<div class="empty" style="padding:1rem">尚無場次</div>';return;}
  let html='';
  [...sessions].reverse().forEach(s=>{
    const mCount=(s.matches||[]).length;
    const scored=(s.matches||[]).filter(m=>m.scoreA!==''&&m.scoreB!=='').length;
    html+=`<div class="session-item${activeSessionId===s.id?' on':''}" onclick="selectSession('${s.id}')">
      <div class="session-date">${fmtDate(s.date)}</div>
      <div class="session-name">${s.name||'未命名'}</div>
      <div class="session-meta">${s.attendees?s.attendees.length+'人':''} ${mCount?mCount+'場':''} ${scored&&scored===mCount?'✓':scored?scored+'/'+mCount:''}</div>
      <button class="session-del" onclick="event.stopPropagation();deleteSession('${s.id}')">刪除</button>
    </div>`;
  });
  el.innerHTML=html;
}

function createSession(){
  const date=document.getElementById('newDate').value;
  const name=document.getElementById('newSessionName').value.trim();
  if(!date){alert('請選擇日期');return;}
  const s={id:genId(),date,name:name||'未命名',attendees:[],matches:[]};
  sessions.push(s);localSave();activeSessionId=s.id;
  document.getElementById('newSessionName').value='';
  renderSessionTab();
}

function selectSession(id){activeSessionId=id;renderSessionList();renderSessionContent(id);}

function deleteSession(id){
  const s=getSession(id);
  if(!confirm(`確定刪除「${s?s.name:'此場次'}」？`))return;
  sessions=sessions.filter(s=>s.id!==id);
  if(activeSessionId===id){activeSessionId=null;document.getElementById('sessionContent').innerHTML='';}
  localSave();renderSessionList();renderRank();
}

function renderSessionContent(id){
  const s=getSession(id);if(!s){document.getElementById('sessionContent').innerHTML='';return;}
  const el=document.getElementById('sessionContent');
  let html='';

  // 出席名單
  html+=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <p style="font-size:15px;font-weight:500">${s.name}</p>
      <span style="font-size:12px;color:#888">${fmtDate(s.date)}</span>
    </div>
    <p class="lbl">勾選今天出席的選手</p>
    <div class="player-grid">`;
  players.forEach(p=>{
    const on=(s.attendees||[]).includes(p);
    html+=`<div class="p-chip${on?' on':''}" onclick="toggleAttend('${s.id}','${p.replace(/'/g,"\\'")}',this)" data-name="${p}"><div class="dot"></div>${p}</div>`;
  });
  html+=`</div>
    <div class="row" style="margin-bottom:0">
      <span style="font-size:12px;color:#888" id="ac_${s.id}">${(s.attendees||[]).length} 人出席</span>
    </div>
  </div>`;

  // 上場統計
  if(s.attendees&&s.attendees.length>=4){
    const playCount={};s.attendees.forEach(p=>playCount[p]=0);
    (s.matches||[]).forEach(m=>{[...m.teamA,...m.teamB].forEach(p=>{if(playCount[p]!==undefined)playCount[p]++;});});
    html+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <p class="lbl" style="margin-bottom:0">本次活動 — ${(s.matches||[]).length} 場</p>
        <button class="btn primary" onclick="addMatch('${s.id}')">＋ 抽下一場</button>
      </div>
      <div class="play-count-grid">`;
    s.attendees.forEach(p=>{
      html+=`<div class="play-count-chip"><div class="pc-name">${p}</div><div class="pc-count">上場 ${playCount[p]} 次</div></div>`;
    });
    html+=`</div>`;

    if(s.matches&&s.matches.length){
      html+=`<div class="match-list">`;
      s.matches.forEach((m,mi)=>{ html+=renderMatchCard(s,m,mi); });
      html+=`</div>
      <div class="row" style="margin-top:12px;margin-bottom:0">
        <button class="btn success" onclick="saveMatches('${s.id}')">儲存並同步</button>
        <span class="savemsg" id="msm_${s.id}">✓ 已儲存！</span>
      </div>`;
    }else{
      html+=`<div style="text-align:center;padding:1.5rem;color:#aaa;font-size:13px">按「抽下一場」開始抽籤</div>`;
    }
    html+=`</div>`;

    // 本場積分小結
    if(s.matches&&s.matches.some(m=>m.scoreA!==''&&m.scoreB!=='')){
      const sc=calcSessionScore(s);
      const wins=calcSessionWins(s);
      const sorted=[...s.attendees].sort((a,b)=>(sc[b]||0)-(sc[a]||0));
      html+=`<div class="card"><p class="lbl" style="margin-bottom:10px">本場積分小結</p>
        <table class="h-table"><thead><tr><th>排名</th><th>選手</th><th>勝場</th><th class="r">積分</th></tr></thead><tbody>`;
      let rank=1;
      sorted.forEach((p,i)=>{
        if(i>0&&(sc[sorted[i]]||0)!==(sc[sorted[i-1]]||0))rank=i+1;
        html+=`<tr><td>${rank}</td><td>${p}</td><td>${wins[p]||0}</td><td class="r"><strong>${sc[p]||0}</strong></td></tr>`;
      });
      html+=`</tbody></table></div>`;
    }
  }else if(s.attendees&&s.attendees.length>0){
    html+=`<div class="card"><div class="empty">需要至少 4 人才能開始抽籤</div></div>`;
  }

  el.innerHTML=html;
}

function renderMatchCard(s,m,mi){
  const sa=m.scoreA!==''?m.scoreA:'',sb=m.scoreB!==''?m.scoreB:'';
  const saNum=parseInt(sa),sbNum=parseInt(sb);
  const hasScore=!isNaN(saNum)&&!isNaN(sbNum);
  const aWin=hasScore&&saNum>sbNum,bWin=hasScore&&sbNum>saNum;
  let resultHTML='';
  if(hasScore){
    if(aWin)resultHTML=`<div class="match-result win">🏆 ${m.teamA.join(' & ')} 勝 +${winPts}分</div>`;
    else if(bWin)resultHTML=`<div class="match-result win">🏆 ${m.teamB.join(' & ')} 勝 +${winPts}分</div>`;
    else resultHTML=`<div class="match-result draw">平手</div>`;
  }
  const cardClass=hasScore?'match-card scored':'match-card';
  return `<div class="${cardClass}" id="mc_${s.id}_${mi}">
    <div class="match-header">
      <span class="match-label">第 ${mi+1} 場</span>
      <button class="btn sm danger" onclick="deleteMatch('${s.id}',${mi})">移除</button>
    </div>
    <div class="match-body">
      <div class="m-side">
        <div class="m-players${aWin?' winner':bWin?' loser':''}">${m.teamA.join('\n& ')}</div>
      </div>
      <div class="vs-col">
        <div class="score-wrap">
          <input type="number" min="0" max="99" value="${sa}" placeholder="—" id="sa_${s.id}_${mi}" onchange="liveScore('${s.id}',${mi})">
          <span class="score-sep">:</span>
          <input type="number" min="0" max="99" value="${sb}" placeholder="—" id="sb_${s.id}_${mi}" onchange="liveScore('${s.id}',${mi})">
        </div>
        <span class="vs-txt">vs</span>
      </div>
      <div class="m-side" style="text-align:right">
        <div class="m-players${bWin?' winner':aWin?' loser':''}">${m.teamB.join('\n& ')}</div>
      </div>
    </div>
    ${resultHTML?`<div style="margin-top:6px">${resultHTML}</div>`:''}
    ${m.waiting&&m.waiting.length?`<div class="waiting-bar">等待：${m.waiting.map(p=>`<span class="waiting-chip">${p}</span>`).join('')}</div>`:''}
  </div>`;
}

function addMatch(sid){
  const s=getSession(sid);if(!s||!s.attendees||s.attendees.length<4)return;
  const m=drawMatch(s.attendees,s.matches);
  if(!m){alert('人數不足，無法抽籤');return;}
  s.matches.push(m);
  localSave();renderSessionContent(sid);renderSessionList();
}

function deleteMatch(sid,mi){
  const s=getSession(sid);if(!s)return;
  s.matches.splice(mi,1);
  localSave();renderSessionContent(sid);renderSessionList();
}

function liveScore(sid,mi){
  const s=getSession(sid);if(!s||!s.matches)return;
  const sa=document.getElementById(`sa_${sid}_${mi}`);
  const sb=document.getElementById(`sb_${sid}_${mi}`);
  if(sa)s.matches[mi].scoreA=sa.value;
  if(sb)s.matches[mi].scoreB=sb.value;
  const mc=document.getElementById(`mc_${sid}_${mi}`);
  if(mc){
    mc.outerHTML=renderMatchCard(s,s.matches[mi],mi);
    const nsa=document.getElementById(`sa_${sid}_${mi}`);
    const nsb=document.getElementById(`sb_${sid}_${mi}`);
    if(nsa)nsa.addEventListener('change',()=>liveScore(sid,mi));
    if(nsb)nsb.addEventListener('change',()=>liveScore(sid,mi));
  }
}

function toggleAttend(sid,name,el){
  const s=getSession(sid);if(!s)return;
  el.classList.toggle('on');
  s.attendees=[];
  document.querySelectorAll('.p-chip.on').forEach(c=>s.attendees.push(c.dataset.name));
  const ac=document.getElementById('ac_'+sid);if(ac)ac.textContent=s.attendees.length+' 人出席';
  localSave();
}

function saveMatches(sid){
  const s=getSession(sid);if(!s||!s.matches)return;
  s.matches.forEach((m,mi)=>{
    const sa=document.getElementById(`sa_${sid}_${mi}`);
    const sb=document.getElementById(`sb_${sid}_${mi}`);
    if(sa)m.scoreA=sa.value;if(sb)m.scoreB=sb.value;
  });
  localSave();renderSessionList();renderRank();
  const msg=document.getElementById('msm_'+sid);
  if(msg){msg.classList.add('show');setTimeout(()=>msg.classList.remove('show'),2000);}
  renderSessionContent(sid);
  pushToCloud();
}

/* ========================
   歷史紀錄
   ======================== */
function renderHistoryTab(){
  const el=document.getElementById('histContent');
  if(!sessions.length){el.innerHTML='<div class="empty">尚無歷史紀錄</div>';return;}
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'
    +'<span style="font-size:14px;font-weight:500">所有場次</span>'
    +'<button class="btn danger sm" onclick="if(confirm(\'確定清除全部？\'))clearAll()">清除全部</button></div>';
  [...sessions].reverse().forEach(s=>{
    const sc=calcSessionScore(s);
    const wins=calcSessionWins(s);
    const sorted=(s.attendees||[]).slice().sort((a,b)=>(sc[b]||0)-(sc[a]||0));
    const mCount=(s.matches||[]).length;
    html+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div><span style="font-size:15px;font-weight:500">${s.name||'未命名'}</span>
          <span style="font-size:12px;color:#888;margin-left:8px">${fmtDate(s.date)}</span></div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:12px;color:#aaa">${(s.attendees||[]).length}人・${mCount}場</span>
          <button class="btn sm danger" onclick="deleteSession('${s.id}')">刪除</button>
        </div>
      </div>`;
    if(sorted.length){
      html+=`<table class="h-table"><thead><tr><th>排名</th><th>選手</th><th>勝場</th><th class="r">積分</th></tr></thead><tbody>`;
      let rank=1;
      sorted.forEach((p,i)=>{
        if(i>0&&(sc[sorted[i]]||0)!==(sc[sorted[i-1]]||0))rank=i+1;
        html+=`<tr><td>${rank}</td><td>${p}</td><td>${wins[p]||0}</td><td class="r"><strong>${sc[p]||0}</strong></td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    if(s.matches&&s.matches.length){
      html+=`<hr class="divider"><div class="match-list">`;
      s.matches.forEach((m,mi)=>{
        const sa=m.scoreA!==''?m.scoreA:'—',sb=m.scoreB!==''?m.scoreB:'—';
        const saNum=parseInt(sa),sbNum=parseInt(sb);
        const aWin=!isNaN(saNum)&&!isNaN(sbNum)&&saNum>sbNum;
        const bWin=!isNaN(saNum)&&!isNaN(sbNum)&&sbNum>saNum;
        html+=`<div class="match-card" style="margin-bottom:0">
          <div class="match-header"><span class="match-label">第 ${mi+1} 場</span></div>
          <div class="match-body">
            <div class="m-side"><div class="m-players${aWin?' winner':bWin?' loser':''}">${m.teamA.join(' & ')}</div></div>
            <div class="vs-col"><div style="font-size:15px;font-weight:500">${sa} : ${sb}</div></div>
            <div class="m-side" style="text-align:right"><div class="m-players${bWin?' winner':aWin?' loser':''}">${m.teamB.join(' & ')}</div></div>
          </div>
          ${m.waiting&&m.waiting.length?`<div class="waiting-bar">等待：${m.waiting.map(p=>`<span class="waiting-chip">${p}</span>`).join('')}</div>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  el.innerHTML=html;
}

/* ========================
   設定
   ======================== */
function renderSettings(){
  const pl=document.getElementById('playerListEl');
  if(!players.length){pl.innerHTML='<div class="empty">尚無選手</div>';}
  else{
    let html='<div style="display:flex;flex-direction:column">';
    players.forEach((p,i)=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #e0dfd8">
        <div class="avatar" style="background:${avBg(i)};color:${avFg(i)};width:28px;height:28px;font-size:11px;flex-shrink:0">${initials(p)}</div>
        <span style="flex:1;font-size:13px">${p}</span>
        <button class="btn sm danger" onclick="removePlayer(${i})">移除</button>
      </div>`;
    });
    html+='</div>';pl.innerHTML=html;
  }
  const uel=document.getElementById('cfgWebAppUrl');if(uel)uel.value=WEB_APP_URL;
  document.getElementById('newName').onkeydown=e=>{if(e.key==='Enter')addPlayer();};
  const wi=document.getElementById('winPtsInput');if(wi)wi.value=winPts;
}

function addPlayer(){
  const inp=document.getElementById('newName');const n=inp.value.trim();
  if(!n||players.includes(n)){inp.focus();return;}
  players.push(n);inp.value='';localSave();renderSettings();
}
function removePlayer(i){
  if(!confirm('確定移除「'+players[i]+'」？'))return;
  players.splice(i,1);localSave();renderSettings();
}
function clearAll(){sessions=[];activeSessionId=null;localSave();document.getElementById('sessionContent').innerHTML='';showTab('rank');}

/* ========================
   雲端同步
   ======================== */
function setSyncStatus(state){
  const el=document.getElementById('syncStatus');el.className='sync-status';
  if(state==='ok'){el.textContent='✓ 已同步';el.classList.add('ok');}
  else if(state==='err'){el.textContent='同步失敗';el.classList.add('err');}
  else if(state==='loading'){el.textContent='同步中…';el.classList.add('loading');}
  else el.textContent='有未儲存變更';
}

async function pullFromCloud(){
  if(!WEB_APP_URL){setSyncStatus('err');return;}
  setSyncStatus('loading');
  try{
    const res=await fetch(WEB_APP_URL+'?action=getData&t='+Date.now());
    const data=await res.json();
    if(data.ok&&(data.sessions||[]).length>=sessions.length){
      players=data.players||players;
      winPts=data.winPts||winPts;
      sessions=data.sessions||sessions;
      localStorage.setItem('bm7_players',JSON.stringify(players));
      localStorage.setItem('bm7_sessions',JSON.stringify(sessions));
      localStorage.setItem('bm7_winPts',String(winPts));
      document.getElementById('syncBar').style.display='none';
      setSyncStatus('ok');renderRank();
    }else setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

async function pushToCloud(){
  if(!WEB_APP_URL)return;
  setSyncStatus('loading');
  const msg=document.getElementById('syncMsg');
  try{
    const res=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({
      action:'saveAll',password:localStorage.getItem('bm_adminPw')||'',
      players,sessions,winPts,ranking:getTotals()
    })});
    const json=await res.json();
    if(json.ok){
      document.getElementById('syncBar').style.display='none';setSyncStatus('ok');
      if(msg){msg.textContent='✓ 已同步！';msg.style.color='#0F6E56';msg.classList.add('show');setTimeout(()=>msg.classList.remove('show'),2500);}
    }else{setSyncStatus('err');if(msg){msg.textContent='失敗';msg.style.color='#A32D2D';msg.classList.add('show');setTimeout(()=>msg.classList.remove('show'),3000);}}
  }catch(e){setSyncStatus('err');}
}

function saveCfgAndSync(){
  const u=(document.getElementById('cfgWebAppUrl')||{}).value.trim();
  if(u){WEB_APP_URL=u;localStorage.setItem('bm_webAppUrl',u);}
  else WEB_APP_URL=FIXED_WEB_APP_URL||localStorage.getItem('bm_webAppUrl')||'';
  pushToCloud();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify({players,sessions,winPts,exportTime:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='羽球積分板備份.json';a.click();URL.revokeObjectURL(url);
}
function triggerImport(){document.getElementById('importFileInput').click();}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.players||!data.sessions){alert('格式不符');return;}
      if(!confirm('確定匯入？會覆蓋目前資料。'))return;
      players=data.players;sessions=data.sessions;winPts=data.winPts||2;
      localSave();showTab('rank');alert('✓ 匯入成功！');
    }catch(err){alert('匯入失敗');}
  };
  reader.readAsText(file);e.target.value='';
}

load();renderRank();
</script>
